name: Sync to Hugging Face hub

on:
  push:
    branches: [main] # จะทำงานเมื่อมีการ Push เข้า Branch main

  # อนุญาตให้กดรันแบบ Manual ได้
  workflow_dispatch:

concurrency:
  group: "huggingface"
  cancel-in-progress: true

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true # จำเป็นถ้าโปรเจกต์มีการใช้ Git LFS สำหรับไฟล์ขนาดใหญ่

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        # แก้ไข USERNAME และ REPO_NAME ในบรรทัดด้านล่างให้ตรงกับของคุณ
        # รูปแบบ URL: https://<USERNAME>:$HF_TOKEN@huggingface.co/spaces/<USERNAME>/<SPACE_NAME>
        run: git push --force https://Th3rds:$HF_TOKEN@huggingface.co/spaces/Th3rds/khamoonaa-bot main